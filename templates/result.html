<!DOCTYPE html>
<html>
<head>

<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2,#6ee7b7);
background-size:400% 400%;
animation: gradientBG 12s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */

.navbar{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
border-radius:20px;
margin:20px auto;
width:90%;
}

/* RESULT CARD */

.result-card{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(20px);
border-radius:25px;
padding:40px;
margin-top:60px;
max-width:700px;
margin-left:auto;
margin-right:auto;
text-align:center;
box-shadow:0 25px 50px rgba(0,0,0,0.25);
transition:0.3s;
}

.result-card:hover{
transform:translateY(-5px);
}

/* BADGE */

.badge{
padding:10px 25px;
border-radius:30px;
font-weight:bold;
margin-bottom:20px;
display:inline-block;
}

.benign{
background:#22c55e;
color:white;
}

.malignant{
background:#ef4444;
color:white;
}

/* PROGRESS */

.progress{
height:12px;
border-radius:20px;
background:rgba(255,255,255,0.2);
margin-top:10px;
}

.progress-bar{
background:linear-gradient(90deg,#ff6a00,#ee0979);
}

/* IMAGE */

.result-img{
width:280px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* BUTTON */

.btn-main{
background: linear-gradient(90deg,#ff6a00,#ee0979);
border:none;
padding:12px 30px;
border-radius:30px;
color:white;
font-weight:bold;
margin-top:25px;
transition:0.3s;
}

.btn-main:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand text-white fw-bold" href="/">
<i class="bi bi-cpu"></i> XAI Breast Cancer
</a>

<div class="ms-auto">
<a class="me-3 text-white" href="/">Home</a>
<a class="me-3 text-white" href="/metrics">Performance</a>
<a class="text-white" href="/about">About</a>
</div>

</div>
</nav>

<!-- RESULT CARD -->

<div class="result-card">

<h2 class="mb-3">
<i class="bi bi-activity"></i> Prediction Result
</h2>

{% if prediction == "Benign" %}
<div class="badge benign">Benign (Low Risk)</div>
{% else %}
<div class="badge malignant">Malignant (High Risk)</div>
{% endif %}

<p class="mt-3">Confidence Score: {{confidence}}</p>

<div class="progress">
<div class="progress-bar" style="width: {{confidence*100}}%"></div>
</div>

<img src="/static/uploads/{{image}}" class="result-img">

<form action="/explain" method="post">

<input type="hidden" name="image_name" value="{{ image }}">
<input type="hidden" name="prediction" value="{{ prediction }}">
<input type="hidden" name="confidence" value="{{ confidence }}">

<button type="submit" class="btn-main">
<i class="bi bi-eye"></i> Generate Grad-CAM
</button>

</form>

</div>

</body>
</html>
