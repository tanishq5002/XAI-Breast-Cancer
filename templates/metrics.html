<!DOCTYPE html>
<html>
<head>

<title>Model Performance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

/* BACKGROUND */

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2,#6ee7b7);
background-size:400% 400%;
animation: gradientBG 12s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */

.navbar{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
border-radius:20px;
margin:20px auto;
width:90%;
}

/* MAIN CARD */

.main-card{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(20px);
border-radius:25px;
padding:40px;
margin-top:40px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
box-shadow:0 25px 50px rgba(0,0,0,0.25);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* METRIC BOX */

.metric{
background: rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

/* PROGRESS BAR */

.bar{
background: rgba(255,255,255,0.2);
height:12px;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.fill{
height:100%;
background: linear-gradient(90deg,#ff6a00,#ee0979);
border-radius:10px;
}

/* IMAGES */

.images img{
width:100%;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* BUTTON */

.btn-back{
display:inline-block;
padding:10px 25px;
border-radius:25px;
border:2px solid rgba(255,255,255,0.7);
color:white;
text-decoration:none;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
transition:0.3s;
}

.btn-back:hover{
background:white;
color:#333;
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand text-white fw-bold" href="/">
<i class="bi bi-cpu"></i> XAI Breast Cancer
</a>

<div class="ms-auto">
<a class="me-3 text-white" href="/">Home</a>
<a class="me-3 text-white" href="/metrics">Performance</a>
<a class="text-white" href="/about">About</a>
</div>

</div>
</nav>

<!-- MAIN -->

<div class="main-card">

<h2 class="text-center">
<i class="bi bi-graph-up"></i> Model Performance
</h2>

<p class="text-center">Validation Metrics of CNN Model</p>

<div class="row mt-4">

<div class="col-md-6">
<div class="metric">
<h5>Accuracy: {{ metrics.accuracy }}</h5>
<div class="bar">
<div class="fill" style="width: {{ metrics.accuracy*100 }}%"></div>
</div>
</div>
</div>

<div class="col-md-6">
<div class="metric">
<h5>Precision: {{ metrics.precision }}</h5>
<div class="bar">
<div class="fill" style="width: {{ metrics.precision*100 }}%"></div>
</div>
</div>
</div>

<div class="col-md-6">
<div class="metric">
<h5>Recall: {{ metrics.recall }}</h5>
<div class="bar">
<div class="fill" style="width: {{ metrics.recall*100 }}%"></div>
</div>
</div>
</div>

<div class="col-md-6">
<div class="metric">
<h5>F1 Score: {{ metrics.f1 }}</h5>
<div class="bar">
<div class="fill" style="width: {{ metrics.f1*100 }}%"></div>
</div>
</div>
</div>

</div>

<!-- IMAGES -->

<h4 class="mt-5 text-center">Evaluation Visualizations</h4>

<div class="row mt-4 text-center">

<div class="col-md-6">
<h6>Confusion Matrix</h6>
<div class="img-box">
<img src="/static/confusion_matrix.png" class="img-fluid">
</div>
</div>

<div class="col-md-6">
<h6>ROC Curve</h6>
<div class="img-box">
<img src="/static/roc_curve.png" class="img-fluid">
</div>
</div> 
<div class="text-center mt-4">
<a href="/" class="btn-back">⬅ Back to Home</a>
</div>

</div>

</body>
</html>
